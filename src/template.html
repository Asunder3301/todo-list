<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>
<body>
    <header>
        <h2>View Projects</h2>
        <h1>Todo List</h1>
        <h2>View Todos</h2>
    </header>
    <main id="project-container">
        <button command="show-modal" commandfor="create-project" type="button" id="add-btn">
            <img src="./assets/plus-icon.svg" width="30px" height="30px">
        </button>
    </main>

    <dialog id="create-project" closeby="none">
        <form method="dialog" id="project-form" autofocus>
            <div class="form-group">
                <label for="project-name">Project Name</label>
                <input type="text" id="project-name" name="project-name" placeholder="Name" required>
            </div>

            <button type="submit" id="submit-btn">Submit</button>
        </form>
    </dialog>
</body>
</html>
